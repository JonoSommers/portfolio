  - title: "Little Shop Final BE (solo)"
    description:
      - Back-end application for the Little Shop e-commerce platform, allowing users to view, purchase, and manage items
      - Built a RESTful API and added a new table to an existing database using Ruby on Rails and PostgreSQL
      - Implemented error handling with rescue_from and utilized TDD with RSpec for both happy and sad paths
      - Updated a front-end route and modified innerHTML to display new data from the back-end
      - "Technologies used: Ruby on Rails, PostgreSQL, RSpec, FactoryBot, ActiveRecord, TDD, Git/GitHub"
    date: Jan. 2025
    image: "![](https://geniusecommerce.com/wp-content/uploads/2017/05/optimize-ecommerce-store.png)"
  - title: "BattleShip (group)"
    description:
      - Terminal-based Battleship game developed in Ruby, allowing users to play against the computer
      - Utilized Test-Driven Development with RSpec to build and test various game components (e.g., Ship, Cell, Board classes)
      - Built the game’s functionality using conditional logic and iterator methods to manage player actions, ship placement, and game progression
      - Collaborated in a group using the driver-navigator method to ensure high-quality code and consistent functionality
      - "Technologies used: Ruby, RSpec, TDD, Git/GitHub"
    date: Oct. 2024
    image: "![](https://www.shutterstock.com/shutterstock/videos/1101022465/thumb/1.jpg?ip=x480)"

