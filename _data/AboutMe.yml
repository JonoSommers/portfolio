contents:
  - description: After years in the hospitality industry, I’ve discovered a new passion—building intuitive, impactful software. My background as a shift leader, server, and bartender taught me how to adapt quickly, problem-solve under pressure, and work seamlessly with a team—skills that translate directly into software development. Now, as a student at Turing School of Software & Design, I’ve honed my ability to write clean, efficient code with a strong emphasis on test-driven development (TDD). I love tackling complex problems and leveraging iterator methods to create elegant, scalable solutions. Whether optimizing workflows in a restaurant or improving functionality in an application, I thrive on finding innovative ways to make systems work better. I’m excited to bring my blend of technical skills and real-world experience to a team that values collaboration, creativity, and problem-solving.